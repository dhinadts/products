name: balance_sheet_ledger
description: A Flutter app for Balance Sheet based ledger management tailored to Indian small-scale industry.
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.0
  go_router: ^7.0.0
  http: ^1.1.0
  equatable: ^2.0.0
  shared_preferences: ^2.2.3
  fl_chart: ^1.2.0
  flutter_svg: ^2.3.0
  flutter_native_splash: ^2.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo/app_logo.png"
  adaptive_icon_background: "#0B3D2E"
  adaptive_icon_foreground: "assets/logo/app_logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/logo/app_logo.png"
    background_color: "#0B3D2E"
    theme_color: "#F4C430"
  windows:
    generate: true
    image_path: "assets/logo/app_logo.png"
    logo_size: 48
  macos:
    generate: true
    image_path: "assets/logo/app_logo.png"

flutter_native_splash:
  color: "#0B3D2E"
  image: "assets/splash/splash_app_logo.png"
  color_dark: "#0B100D"
  # image_dark: "assets/splash/splash_logo_dark.png"
  android: true
  ios: true
  web: true
  android_12:
    color: "#0B3D2E"
    image: "assets/splash/splash_logo_android12.png"
    color_dark: "#0B100D"
    image_dark: "assets/splash/splash_logo_android12_dark.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/onboarding/
    - assets/logo/
    - assets/splash/
    - assets/dhinadts/
